<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crop Recommendation System</title>

<link rel="stylesheet" href="{{ url_for('static', filename='static.css') }}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="background">

<div class="container">

<header>
<h1><i class="fa-solid fa-seedling"></i> Crop Recommendation System</h1>
<p>Enter soil and climate conditions to get the best crop recommendation.</p>
</header>

<form action="/predict" method="POST" class="recommendation-form">

<div class="form-group">
<label><i class="fa-solid fa-flask"></i> Nitrogen</label>
<input type="number" step="any" name="nitrogen" required>
</div>

<div class="form-group">
<label><i class="fa-solid fa-flask"></i> Phosphorus</label>
<input type="number" step="any" name="phosphorus" required>
</div>

<div class="form-group">
<label><i class="fa-solid fa-flask"></i> Potassium</label>
<input type="number" step="any" name="potassium" required>
</div>

<div class="form-group">
<label><i class="fa-solid fa-temperature-high"></i> Temperature (°C)</label>
<input type="number" step="any" name="temperature" required>
</div>

<div class="form-group">
<label><i class="fa-solid fa-droplet"></i> Humidity (%)</label>
<input type="number" step="any" name="humidity" required>
</div>

<div class="form-group">
<label><i class="fa-solid fa-vial"></i> pH Level</label>
<input type="number" step="any" name="ph" required>
</div>

<div class="form-group">
<label><i class="fa-solid fa-cloud-rain"></i> Rainfall (mm)</label>
<input type="number" step="any" name="rainfall" required>
</div>

<button type="submit" class="btn-submit">
<i class="fa-solid fa-leaf"></i> Recommend Crop
</button>

</form>

{% if prediction_text %}

<div class="prediction-result">

<h2>
<i class="fa-solid fa-check-circle"></i>
Recommended Crop
</h2>

<p class="prediction-text">
{{ prediction_text.capitalize() }}
</p>

{% if crop_image %}
<div class="prediction-image">

<img src="{{ url_for('static', filename='crops/' + crop_image) }}" 
class="crop-img">

</div>
{% endif %}

{% if wiki_link %}
<div style="margin-top:20px;">
<a href="{{ wiki_link }}" target="_blank">
<button class="btn-submit">
Learn More About This Crop
</button>
</a>
</div>
{% endif %}

</div>

{% endif %}

</div>

</div>

</body>
</html>
